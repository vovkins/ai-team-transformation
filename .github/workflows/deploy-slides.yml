name: Deploy Slides to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'slides/**'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - run: npm ci
        working-directory: slides

      - run: npx slidev build --base /ai-team-transformation/
        working-directory: slides

      # Inject global CSS to hide navigation controls
      - run: |
          cat > slides/dist/overrides.css << 'CSSEOF'
          /* Hide all Slidev navigation controls */
          nav, .slidev-controls, .slidev-toolbar, .slidev-nav,
          [class*="NavControls"], [class*="ContextMenu"],
          .slidev-context-menu, .slidev-goto-dialog, .slidev-info-dialog,
          .slidev-drawing-controls, .slidev-glass-effect,
          .slidev-icon-btn, [class*="controls-wrapper"] {
            display: none !important;
          }
          CSSEOF
          # Inject CSS link into index.html
          sed -i 's|</head>|<link rel="stylesheet" href="/ai-team-transformation/overrides.css"></head>|' slides/dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: slides/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
